title: CommodityNode
tagline: "Where Raw Materials Meet Markets"
description: "Interactive analysis of how commodity price movements ripple through global industries, ETFs, and stocks. Real-time impact maps for crude oil, gold, copper, lithium, and more."
url: "https://commoditynode.com"
baseurl: ""

author:
  name: CommodityNode Research
  email: contact@commoditynode.com
  twitter: commoditynode

lang: en
timezone: America/New_York
logo: /assets/images/logo.svg

twitter:
  username: commoditynode
  card: summary_large_image

social:
  name: CommodityNode
  links:
    - https://twitter.com/commoditynode

google_analytics: "G-8YF60DEP0W"

markdown: kramdown
permalink: /:title/
paginate: 12
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

collections:
  commodities:
    output: true
    permalink: /commodities/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: CommodityNode Research
      image: /assets/images/og-default.svg
  - scope:
      path: ""
      type: "commodities"
    values:
      layout: "commodity"

exclude:
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

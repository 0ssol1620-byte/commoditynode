title: CommodityNode
tagline: "Where Raw Materials Meet Markets"
description: "Interactive analysis of how commodity price movements ripple through global industries, ETFs, and stocks. Real-time impact maps for crude oil, gold, copper, lithium, and more."
url: "https://commoditynode.com"
baseurl: ""

# Author
author:
  name: CommodityNode Research
  email: contact@commoditynode.com
  twitter: commoditynode

# SEO
lang: en
timezone: America/New_York
logo: /assets/images/logo.png

# Social
twitter:
  username: commoditynode
  card: summary_large_image

social:
  name: CommodityNode
  links:
    - https://twitter.com/commoditynode

# Google
google_analytics: "G-8YF60DEP0W"  # Add GA4 ID later
google_site_verification: ""  # Add after GSC verification

# Build
markdown: kramdown
permalink: /:title/
paginate: 10
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Collections
collections:
  commodities:
    output: true
    permalink: /commodities/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: CommodityNode Research
      image: /assets/images/og-default.png
  - scope:
      path: ""
      type: "commodities"
    values:
      layout: "commodity"

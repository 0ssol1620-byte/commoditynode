title: CommodityNode
description: "Where Raw Materials Meet Markets — Interactive commodity-to-industry impact analysis"
url: "https://commoditynode.com"
baseurl: ""
lang: en
timezone: Asia/Seoul

# Build
markdown: kramdown
permalink: /:title/
paginate: 10
paginate_path: "/page/:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# SEO
twitter:
  card: summary_large_image
social:
  name: CommodityNode

# Collections
collections:
  commodities:
    output: true
    permalink: /commodities/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "CommodityNode"
  - scope:
      path: ""
      type: "commodities"
    values:
      layout: "commodity"

title: CommodityNode
tagline: "Where Raw Materials Meet Markets"
description: "Track commodity price movements with AI-powered forecasts. Real-time impact analysis for gold, oil, copper, uranium and 60+ commodities — with company sensitivity scores and supply disruption alerts."
url: "https://commoditynode.com"
baseurl: ""

author:
  name: CommodityNode Research
  email: contact@commoditynode.com
  twitter: commoditynode

lang: en
timezone: America/New_York
title_separator: "|"
logo: /assets/images/logo.svg

twitter:
  username: commoditynode
  card: summary_large_image

social:
  name: CommodityNode
  links:
    - https://twitter.com/commoditynode

coverage_counts:
  commodity_hubs: 62
  direct_commodities: 27
  proxy_hubs: 27
  analysis_only_hubs: 8
  companies: 74
  industries: 31
  themes: 23

google_analytics: "G-8VF60DEP0W"

markdown: kramdown
permalink: /:title/
paginate: 12
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

collections:
  commodities:
    output: true
    permalink: /commodities/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: CommodityNode Research
      image: /assets/images/og-default.png
  - scope:
      path: ""
      type: "commodities"
    values:
      layout: "commodity"
  - scope:
      path: "tags"
    values:
      sitemap: false
  - scope:
      path: "social"
    values:
      sitemap: false

feed:
  title: "CommodityNode Signal Reports"
  description: "Commodity price impact analysis for markets, supply chains, and equities"
  path: "feed.xml"

future: true

include:
  - ads.txt
  - llms.txt
  - indexnow-commoditynode.txt
  - c7f3a2e8b4d91f06e5a0c3b8d2e7f1a4.txt

exclude:
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - AUDIT_REPORT.md
  - CRON_SETUP.md
  - ROADMAP.md
  - SEO_AUDIT.md
  - DEV_TODO.md
  - QUALITY_REPORT.md
  - FINAL_AUDIT.md
  - FINAL_CHECK.md
  - logs/
  - scripts/
  - social/

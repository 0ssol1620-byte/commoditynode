{% unless page.no_loader %}
<div id="page-loader" style="position:fixed;inset:0;background:#050510;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;">
  <div style="position:relative;width:80px;height:80px;margin-bottom:20px;">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="4" fill="#fbbf24"/>
      <circle cx="40" cy="40" r="16" fill="none" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="2 3"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1" stroke-dasharray="2 4"/>
      <circle cx="40" cy="40" r="38" fill="none" stroke="rgba(34,211,238,0.1)" stroke-width="1" stroke-dasharray="2 5"/>
      <circle r="5" fill="#22d3ee" opacity="0.9"><animateMotion dur="1.5s" repeatCount="indefinite" path="M40,40 m-28,0 a28,28 0 1,1 56,0 a28,28 0 1,1 -56,0"/></circle>
      <circle r="4" fill="#10b981" opacity="0.8"><animateMotion dur="2.5s" repeatCount="indefinite" path="M40,40 m-38,0 a38,38 0 1,1 76,0 a38,38 0 1,1 -76,0"/></circle>
      <circle r="3" fill="#fbbf24" opacity="0.7"><animateMotion dur="3.5s" repeatCount="indefinite" path="M40,40 m-16,0 a16,16 0 1,1 32,0 a16,16 0 1,1 -32,0"/></circle>
    </svg>
  </div>
  <div style="color:#22d3ee;font-family:'DM Sans',system-ui,sans-serif;font-size:0.9rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.8;">CommodityNode</div>
  <div style="color:#475569;font-size:0.75rem;margin-top:6px;letter-spacing:0.05em;">Hydrating live intelligence · forecasts · proof rail</div>
</div>
<script>
(function(){
  function hideLoader(){
    var l=document.getElementById('page-loader');
    if(l){l.style.opacity='0';setTimeout(function(){l.style.display='none';},400);}
  }
  document.addEventListener('DOMContentLoaded',hideLoader);
})();
</script>
{% endunless %}

<!-- Newsletter Subscription Form -->
<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;text-align:center;">
  <p style="font-size:0.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;">Stay Informed</p>
  <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:8px;color:var(--text);">Get Weekly Commodity Intelligence</h3>
  <p style="font-size:0.85rem;color:var(--text2);margin-bottom:20px;max-width:420px;margin-left:auto;margin-right:auto;">Signal Reports, price alerts, and ripple chain analysis — delivered to your inbox every Monday.</p>
  <form name="newsletter" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="display:flex;gap:8px;max-width:440px;margin:0 auto;flex-wrap:wrap;justify-content:center;">
    <input type="hidden" name="form-name" value="newsletter">
    <p style="display:none;"><label>Don't fill this out: <input name="bot-field"></label></p>
    <input type="email" name="email" required placeholder="your@email.com" aria-label="Email address" style="flex:1;min-width:200px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='rgba(34,211,238,0.5)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
    <button type="submit" class="btn btn-primary" style="padding:10px 24px;font-size:0.9rem;white-space:nowrap;">Subscribe</button>
  </form>
  <p style="font-size:0.72rem;color:var(--text3);margin-top:12px;">No spam. Unsubscribe anytime.</p>
</div>

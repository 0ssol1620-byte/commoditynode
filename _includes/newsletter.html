<!-- Newsletter Subscription Form — CSP-safe Mailchimp form post -->
<style>
#newsletter-email:focus { border-color: rgba(34, 211, 238, 0.5) !important; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15); }
</style>
<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;text-align:center;">
  <p style="font-size:0.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;">Stay Informed</p>
  <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:8px;color:var(--text);">Weekly Commodity Signal Digest</h3>
  <p style="font-size:0.85rem;color:var(--text2);margin-bottom:20px;max-width:420px;margin-left:auto;margin-right:auto;">Every Monday: the 3 most actionable commodity signals, biggest supply disruptions, and key events to watch. Free, no spam.</p>
  <form id="newsletter-form" action="https://gmail.us6.list-manage.com/subscribe/post?u=6efff402bc322a88c7eb718dd&amp;id=b65e529024&amp;f_id=00fd5fe0f0" method="post" target="newsletter-target" novalidate style="display:flex;gap:8px;max-width:440px;margin:0 auto;flex-wrap:wrap;justify-content:center;">
    <input type="email" id="newsletter-email" name="EMAIL" required placeholder="your@email.com" aria-label="Email address" autocomplete="email"
      style="flex:1;min-width:200px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;">
    <input type="hidden" name="tags" value="2146524">
    <div style="position:absolute;left:-5000px;" aria-hidden="true">
      <input type="text" name="b_6efff402bc322a88c7eb718dd_b65e529024" tabindex="-1" value="" autocomplete="off" aria-hidden="true" aria-label="Leave blank">
    </div>
    <button type="submit" id="newsletter-btn" class="btn btn-primary" style="padding:10px 24px;font-size:0.9rem;white-space:nowrap;">Subscribe</button>
  </form>
  <iframe name="newsletter-target" title="Newsletter signup" style="display:none;"></iframe>
  <p id="newsletter-msg" style="font-size:0.85rem;margin-top:12px;min-height:20px;"></p>
  <p style="font-size:0.72rem;color:var(--text3);margin-top:4px;">No spam. Unsubscribe anytime.</p>
  <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:10px;">
    <span style="font-size:0.72rem;color:#475569;">&#10003; Weekly signals</span>
    <span style="font-size:0.72rem;color:#475569;">&#10003; Disruption alerts</span>
    <span style="font-size:0.72rem;color:#475569;">&#10003; Key events calendar</span>
  </div>
</div>
<script>
(function(){
  var form = document.getElementById('newsletter-form');
  var emailInput = document.getElementById('newsletter-email');
  var msg  = document.getElementById('newsletter-msg');
  var btn  = document.getElementById('newsletter-btn');
  if (!form || !emailInput || !msg || !btn) return;

  form.addEventListener('submit', function(e) {
    var email = emailInput.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      e.preventDefault();
      msg.style.color = '#f43f5e';
      msg.textContent = 'Please enter a valid email address.';
      emailInput.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Submitting…';
    msg.style.color = '#10b981';
    msg.textContent = 'Submitting… If accepted, you will receive a confirmation email shortly.';

    window.setTimeout(function() {
      btn.disabled = false;
      btn.textContent = 'Subscribe';
    }, 4000);
  });
})();
</script>

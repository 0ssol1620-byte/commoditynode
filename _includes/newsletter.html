<!-- Newsletter Subscription Form — Mailchimp JSONP -->
<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;text-align:center;">
  <p style="font-size:0.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;">Stay Informed</p>
  <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:8px;color:var(--text);">Get Weekly Commodity Intelligence</h3>
  <p style="font-size:0.85rem;color:var(--text2);margin-bottom:20px;max-width:420px;margin-left:auto;margin-right:auto;">Signal Reports, price alerts, and ripple chain analysis — delivered to your inbox every Monday.</p>
  <form id="newsletter-form" style="display:flex;gap:8px;max-width:440px;margin:0 auto;flex-wrap:wrap;justify-content:center;">
    <input type="email" id="newsletter-email" required placeholder="your@email.com" aria-label="Email address"
      style="flex:1;min-width:200px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;"
      onfocus="this.style.borderColor='rgba(34,211,238,0.5)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
    <button type="submit" id="newsletter-btn" class="btn btn-primary" style="padding:10px 24px;font-size:0.9rem;white-space:nowrap;">Subscribe</button>
  </form>
  <p id="newsletter-msg" style="font-size:0.85rem;margin-top:12px;min-height:20px;"></p>
  <p style="font-size:0.72rem;color:var(--text3);margin-top:4px;">No spam. Unsubscribe anytime.</p>
</div>
<script>
(function(){
  var form = document.getElementById('newsletter-form');
  var msg  = document.getElementById('newsletter-msg');
  var btn  = document.getElementById('newsletter-btn');
  if (!form) return;

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var email = document.getElementById('newsletter-email').value.trim();
    if (!email) return;

    btn.disabled = true;
    btn.textContent = 'Subscribing…';
    msg.textContent = '';
    msg.style.color = '';

    // Mailchimp JSONP — official embed method, no CORS issues
    var cbName = 'mc_cb_' + Date.now();
    var script  = document.createElement('script');
    var timeout = setTimeout(function() {
      showError();
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }, 8000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data.result === 'success') {
        form.innerHTML = '<p style="color:#10b981;font-weight:600;font-size:0.95rem;">✓ Subscribed! Welcome to CommodityNode.</p>';
      } else {
        // already subscribed or other error
        var txt = (data.msg || '').toLowerCase();
        if (txt.indexOf('already subscribed') !== -1) {
          form.innerHTML = '<p style="color:#10b981;font-weight:600;font-size:0.95rem;">✓ You\'re already subscribed!</p>';
        } else {
          showError();
        }
      }
    };

    function showError() {
      btn.disabled = false;
      btn.textContent = 'Subscribe';
      msg.style.color = '#f43f5e';
      msg.textContent = 'Something went wrong. Please try again.';
    }

    var u = '6efff402bc322a88c7eb718dd';
    var id = 'b65e529024';
    script.src = 'https://gmail.us6.list-manage.com/subscribe/post-json?u=' + u +
                 '&id=' + id + '&EMAIL=' + encodeURIComponent(email) +
                 '&c=' + cbName;
    document.head.appendChild(script);
  });
})();
</script>

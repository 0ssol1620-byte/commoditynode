<!-- Organization + WebSite Schema (GEO: entity recognition by AI search engines) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "CommodityNode",
  "url": "https://commoditynode.com",
  "logo": {
    "@type": "ImageObject",
    "url": "https://commoditynode.com/assets/images/logo.svg",
    "width": 200,
    "height": 60
  },
  "description": "Interactive analysis of how commodity price movements ripple through global industries, ETFs, and stocks.",
  "sameAs": [
    "https://www.threads.net/@commoditynode",
    "https://twitter.com/commoditynode"
  ],
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "customer support",
    "email": "contact@commoditynode.com"
  }
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "CommodityNode",
  "url": "https://commoditynode.com",
  "description": "Commodity price impact maps for markets, supply chains and equities.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://commoditynode.com/reports/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

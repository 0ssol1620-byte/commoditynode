faqs:
  - q: "How do I cancel?"
    a: "Cancel anytime from your billing portal. No questions asked."
  - q: "What's the difference between Free and Pro?"
    a: "Free gives you access to all 60 commodity hubs, up to 3 Signal Reports per month, plus the public forecast stack and simulator preview context so you can evaluate the workflow before paying. Pro unlocks unlimited Signal Reports, the full scenario workflow, company sensitivity analysis, and trading notes on each signal."
  - q: "What happens after the 7-day trial?"
    a: "Your account automatically converts to the Free tier. No charge. You keep access to all commodity hubs, public reports, the public forecast stack, and simulator preview context while you decide whether Pro belongs in your workflow."
  - q: "Can I cancel anytime?"
    a: "Yes. Cancel from your billing portal at any time — your Pro access stays active until the end of the paid period."
  - q: "Do you offer refunds?"
    a: "Yes — full refund within 14 days if Pro isn't right for you."
  - q: "Do you offer API access?"
    a: "API access is available on the Enterprise plan. Contact us for documentation and rate limits."
  - q: "How does Enterprise work?"
    a: "Contact us for team seats, API access, and custom data exports. We'll respond within 24 hours. Enterprise includes everything in Pro plus dedicated support and custom integrations."
  - q: "Is Pro worth it for individual investors?"
    a: "Yes. Most Pro members are individual investors and self-directed traders who want the same commodity intelligence that professional analysts use, without institutional pricing. If you manage a portfolio with commodity-sensitive stocks (energy, mining, agriculture, airlines), Pro pays for itself quickly."

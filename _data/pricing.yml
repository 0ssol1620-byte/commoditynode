# CommodityNode pricing source-of-truth.
# Research-access positioning: no live checkout URLs until server-side verification exists.

currency: USD

checkout:
  pro_30_day: "/pricing/"
  pro_annual: "/pricing/"
  enterprise: "/enterprise/"

plans:
  - id: free
    name: Free
    price: 0
    price_label: "$0"
    billing: "access"
    tagline: "Public commodity intelligence preview."
    cta_label: "Start free research workflow"
    cta_url: "/start/"
    highlights:
      - "Public commodity hubs"
      - "Delayed market snapshot"
      - "Sample scenario memo"
      - "Limited simulator preview"
  - id: pro_30_day
    name: Pro 30-Day Research Access
    price: 29
    price_label: "$29"
    billing: "30 days"
    tagline: "Full market intelligence, scenario analytics, and research archive access."
    cta_label: "Request 30-Day Access"
    cta_url: "mailto:contact@commoditynode.com?subject=CommodityNode%2030-Day%20Research%20Access"
    highlights:
      - "Full Intelligence Lab access"
      - "Premium research archive"
      - "Watchlist scenario memo"
      - "Forecast uncertainty ranges"
      - "Commodity shock simulator"
    primary: true
  - id: pro_annual
    name: Pro Annual Research Access
    price: 249
    price_label: "$249"
    billing: "year"
    tagline: "Annual research access for recurring market-monitoring workflows."
    cta_label: "Request Annual Access"
    cta_url: "mailto:contact@commoditynode.com?subject=CommodityNode%20Annual%20Research%20Access"
    highlights:
      - "Everything in 30-Day Access"
      - "Annual research archive"
      - "Priority feature access"
      - "Exportable research notes"
  - id: enterprise
    name: Enterprise Research License
    price_label: "Custom"
    billing: "annual license"
    tagline: "Team seats, invoice payment, procurement workflows, and custom watchlists."
    cta_label: "Request Enterprise Invoice"
    cta_url: "/enterprise/"
    highlights:
      - "Team seats"
      - "Invoice payment"
      - "Procurement and supply-chain workflows"
      - "Custom commodity watchlists"
      - "Dedicated onboarding"

guarantees:
  refund_days_30_day: 7
  refund_days_annual: 14
  refund_copy: "Refund eligibility depends on product type and usage. See Refund Policy."
  payment_processor: "Manual access requests now; PayPal and global card providers require server-side verification before unlock."

benefits:
  pro_bullets:
    - headline: "Forecast uncertainty ranges"
      body: "Probabilistic scenario inputs with p10-p90 ranges, model spread, and timestamps."
    - headline: "Scenario analytics"
      body: "Stress-test commodity shocks across business, supply-chain, and market contexts."
    - headline: "Premium research archive"
      body: "Deeper market intelligence memos with source context and methodology links."
    - headline: "Company exposure context"
      body: "Research-grade exposure mapping for business planning and monitoring workflows."

faqs:
  - q: "How is paid access handled now?"
    a: "Until PayPal or global card integration is live with server-side verification, paid access requests are handled manually or by enterprise invoice."
  - q: "Is this investment advice?"
    a: "No. CommodityNode provides informational market research and scenario analytics only."
  - q: "Do you offer refunds?"
    a: "Yes. See the Refund Policy for 30-Day Access, Annual Access, and Enterprise terms."

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <!-- D3.js for interactive charts -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <!-- AdSense placeholder (uncomment after approval) -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXX" crossorigin="anonymous"></script> -->
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">⛓️</span>
        <span class="logo-text">Commodity<strong>Node</strong></span>
      </a>
      <nav>
        <a href="/">Home</a>
        <a href="/commodities/">Commodities</a>
        <a href="/about/">About</a>
      </nav>
    </div>
  </header>
  
  <main class="container">
    {{ content }}
  </main>
  
  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} CommodityNode. All rights reserved.</p>
      <nav>
        <a href="/privacy/">Privacy</a>
        <a href="/contact/">Contact</a>
        <a href="/feed.xml">RSS</a>
      </nav>
    </div>
  </footer>
</body>
</html>

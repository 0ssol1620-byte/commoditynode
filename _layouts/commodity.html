---
layout: default
---
<article class="commodity-page">
  <h1>{{ page.title }}</h1>
  <div class="commodity-meta">
    <span class="symbol">{{ page.symbol }}</span>
    <span class="category">{{ page.category }}</span>
  </div>
  
  <div id="impact-graph" class="impact-graph" data-commodity="{{ page.slug }}"></div>
  
  <div class="post-content">
    {{ content }}
  </div>
</article>
<script src="{{ '/assets/js/impact-graph.js' | relative_url }}"></script>

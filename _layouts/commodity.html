---
layout: default
---

<header class="post-header">
  <div class="container">
    <div class="post-header-badge">
      <span class="badge badge-gold">Commodity</span>
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="post-meta-bar">{{ page.description }}</p>
    {% endif %}
  </div>
</header>

<div class="container" style="padding:48px 24px 80px;">
  <div class="post-content" data-animate>
    {{ content }}
  </div>
</div>

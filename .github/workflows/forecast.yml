name: Daily Commodity Forecast

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 UTC 01:00 (KST 10:00)
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas
          pip install chronos-forecasting || echo "Chronos not available, using fallback"
      
      - name: Run forecast
        run: python scripts/forecast_chronos2.py
      
      - name: Commit forecast data
        run: |
          git config --global user.name 'CommodityNode Bot'
          git config --global user.email 'bot@commoditynode.com'
          git add assets/data/forecast.json
          git diff --staged --quiet || git commit -m "chore: update commodity forecasts [skip ci]"
          git push

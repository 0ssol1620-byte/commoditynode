name: Daily Commodity Forecast (Chronos-2)

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 UTC 01:00 (KST 10:00)
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Chronos-2 모델 다운로드 + 추론 시간 고려

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chronos2-${{ runner.os }}-v1
          restore-keys: |
            hf-chronos2-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance numpy pandas torch --index-url https://download.pytorch.org/whl/cpu
          pip install 'chronos-forecasting[extras]>=2.2'

      - name: Run Chronos-2 forecast
        run: python scripts/forecast_chronos2.py

      - name: Commit forecast data
        run: |
          git config --global user.name 'CommodityNode Bot'
          git config --global user.email 'bot@commoditynode.com'
          git add assets/data/forecast.json
          git diff --staged --quiet || git commit -m "chore: update forecasts with Chronos-2 [skip ci]"
          git push

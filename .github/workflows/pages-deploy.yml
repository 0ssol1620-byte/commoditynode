name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install bundle
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        id: build_jekyll
        continue-on-error: true
        run: |
          set -o pipefail
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" --trace 2>&1 | tee build.log
        env:
          JEKYLL_ENV: production

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-log
          path: build.log

      - name: Print build log tail
        if: steps.build_jekyll.outcome != 'success'
        run: tail -n 200 build.log

      - name: Fail if build failed
        if: steps.build_jekyll.outcome != 'success'
        run: exit 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Daily Commodity Price Update

on:
  schedule:
    - cron: '0 0 * * *'  # 9AM KST = 0:00 UTC
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Create assets/data directory
        run: mkdir -p assets/data

      - name: Update commodity prices and chart data
        run: python scripts/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Auto-update: prices + charts $(date +'%Y-%m-%d')"
          git push

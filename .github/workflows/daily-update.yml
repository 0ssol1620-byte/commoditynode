name: Daily Commodity Price Update

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:      # 수동 트리거도 가능

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update commodity prices and chart data
        run: python scripts/update_prices.py

      - name: Generate Chronos-2 forecast
        run: python scripts/forecast_chronos2.py

      - name: Generate TimesFM forecast
        run: python scripts/forecast_timesfm.py

      - name: Merge Chronos-2 + TimesFM into consensus
        run: python scripts/merge_forecasts.py || echo "merge skipped"

      - name: Build home forecast summary (trimmed payload)
        run: python scripts/build_home_forecast_summary.py

      - name: Slice chart-data per symbol
        run: python scripts/build_chart_slices.py

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add assets/data/prices.json _data/prices.json assets/data/chart-data.json assets/data/chart-data assets/data/forecast.json assets/data/forecast-consensus.json assets/data/home-forecast-summary.json scripts/forecast_timesfm.py
          git diff --staged --quiet || git commit -m "📊 Auto-update: commodity data $(date +'%Y-%m-%d')"
          git push
